<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Football Intelligence — Head-to-Head Comparison" />
  <title>Head-to-Head — Football Intelligence</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <nav id="nav-root" aria-label="Main navigation"></nav>

  <main id="main-content">
    <div class="cm-topbar">
      <a class="back-link" href="/">&#8592; Back to Leaderboard</a>
      <button id="cm-swap-btn" class="btn btn--sm" hidden>&#8596; Swap players</button>
    </div>

    <!-- Guidance (no params) -->
    <div id="cm-guidance" class="banner banner--info" hidden role="status"></div>

    <!-- Error state -->
    <div id="compare-error" class="banner banner--error" hidden role="alert"></div>

    <!-- Loading -->
    <div id="cm-loading" class="cm-loading" hidden aria-live="polite">Loading comparison…</div>

    <!-- Comparison content — hidden until data is loaded -->
    <div id="cm-content" hidden>

      <!-- Data warning (cross-position or small sample) -->
      <div id="cm-warning" class="banner banner--warning" hidden role="alert"></div>

      <!-- Player header cards -->
      <div class="cm-headers">
        <div id="cm-p1-card" class="cm-player-card cm-player-card--p1"></div>
        <div class="cm-vs" aria-hidden="true">vs</div>
        <div id="cm-p2-card" class="cm-player-card cm-player-card--p2"></div>
      </div>

      <!-- Verdict -->
      <div id="cm-verdict" class="card cm-verdict" role="region" aria-label="Comparison verdict"></div>

      <!-- Comparison table -->
      <div class="card cm-table-card">
        <h2 class="cm-section-title">Season Statistics</h2>
        <div class="cm-table-scroll">
          <table class="cm-table" id="cm-table" aria-label="Head-to-head statistics"></table>
        </div>
      </div>

      <!-- Strengths & Weaknesses -->
      <div id="cm-sw"></div>

    </div><!-- /#cm-content -->
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/compare.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      initNav();
      initComparison();
    });
  </script>

</body>
</html>
